.stat-l{font-size:11px;color:#9ca3af;margin-top:2px}

.prog-bg{background:#e9ecf0;border-radius:99px;height:10px;overflow:hidden}

.sync-btn{display:inline-flex;align-items:center;gap:8px;margin-top:14px;padding:9px 18px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
.sync-btn:hover{background:#0F6E56}

.sync-note{font-size:11px;color:#9ca3af;margin-top:6px}

.arr{font-size:12px;color:#9ca3af;flex-shrink:0;transition:transform .2s;display:inline-block}

const STORE = 'mcsa_abeer_v3';
let saved = {};
try{ saved = JSON.parse(localStorage.getItem(STORE)||'{}'); }catch(e){}

// ─── URL hash sync ──────────────────────────────────────────
function encodeState() {
  const bytes = new Uint8Array(Math.ceil(allKeys.length / 8));
  allKeys.forEach((key, i) => {
    if (saved[key]) bytes[Math.floor(i/8)] |= (1 << (i % 8));
  });
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function decodeState(hash) {
  try {
    const b64 = hash.replace(/-/g,'+').replace(/_/g,'/');
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    allKeys.forEach((key, i) => {
      saved[key] = !!(bytes[Math.floor(i/8)] & (1 << (i % 8)));
    });
    return true;
  } catch(e){ return false; }
}
function syncCheckboxes() {
  allKeys.forEach(key => {
    const cb = document.getElementById(key);
    const row = document.getElementById('row-'+key);
    if(cb) cb.checked = !!saved[key];
    if(row) row.classList.toggle('done', !!saved[key]);
  });
}
function copySyncLink() {
  const url = location.origin + location.pathname + location.search + '#' + encodeState();
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('sync-btn');
    const note = document.getElementById('sync-note');
    btn.textContent = '✅ تم النسخ! افتح الرابط على الجوال';
    btn.classList.add('copied');
    note.textContent = 'الرابط في الحافظة — الصقه في متصفح الجوال أو أرسله لنفسك عبر واتساب';
    setTimeout(()=>{
      btn.textContent = '📱 مزامنة مع الجوال — انسخ الرابط';
      btn.classList.remove('copied');
      note.textContent = 'اضغط الزر لنسخ رابط يحتوي تقدمك الحالي، ثم افتحه على الجوال';
    }, 4000);
  }).catch(()=>{
    prompt('انسخ هذا الرابط وافتحه على الجوال:', url);
  });
}

// ─── Build UI ────────────────────────────────────────────────
const wrap = document.getElementById('sec-wrap');
let allKeys = [];

sections.forEach(sec => {
  const div = document.createElement('div');
  div.className = 'sec c-'+sec.color;
  div.id = sec.id;
  const hdr = document.createElement('div');
  hdr.className = 'sec-hdr';
  hdr.innerHTML = `
    <div class="sec-ic">${sec.ic}</div>
    <div class="sec-info">
      <div class="sec-name">${sec.name}</div>
      <div class="sec-meta">${sec.meta}</div>
    </div>
    <div class="sec-prog"><div class="sec-prog-fill" id="spf-${sec.id}"></div></div>
    <span class="sec-pct" id="spct-${sec.id}">0%</span>
    <span class="arr">▾</span>`;
  hdr.onclick = () => div.classList.toggle('collapsed');
  div.appendChild(hdr);
  const body = document.createElement('div');
  body.className = 'sec-body';
  const vids = document.createElement('div');
  vids.className = 'vids';

  sec.videos.forEach(v => {
    const key = 'v_'+v.n;
    allKeys.push(key);
    const row = document.createElement('div');
    row.className = 'vid'+(saved[key]?' done':'');
    row.id = 'row-'+key;
    const cb = document.createElement('input');
    cb.type='checkbox'; cb.id=key; cb.checked=!!saved[key];
    cb.onchange=()=>{ saved[key]=cb.checked; row.classList.toggle('done',cb.checked); save(); updateAll(); };
    const num = document.createElement('span');
    num.className='vid-num'; num.textContent=v.n;
    const lbl = document.createElement('label');
    lbl.htmlFor=key; lbl.textContent=v.t;
    row.appendChild(cb); row.appendChild(num); row.appendChild(lbl);
    vids.appendChild(row);
  });

  body.appendChild(vids);
  div.appendChild(body);
  wrap.appendChild(div);
});

// ─── Logic ───────────────────────────────────────────────────
function updateAll() {
  const total=allKeys.length, done=allKeys.filter(k=>saved[k]).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('pct-lbl').textContent=done+' / '+total;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-left').textContent=total-done;
  document.getElementById('s-pct').textContent=pct+'%';
  sections.forEach(sec=>{
    const allV=sec.videos.map(v=>'v_'+v.n);
    const sd=allV.filter(k=>saved[k]).length;
    const sp=allV.length?Math.round(sd/allV.length*100):0;
    const pf=document.getElementById('spf-'+sec.id);
    const pc=document.getElementById('spct-'+sec.id);
    if(pf)pf.style.width=sp+'%';
    if(pc)pc.textContent=sp+'%';
  });
}

function save(){
  try{ localStorage.setItem(STORE,JSON.stringify(saved)); }catch(e){}
}

updateAll();

// Load from URL hash on page open
(function(){
  const hash=location.hash.slice(1);
  if(hash&&hash.length>4){
    if(decodeState(hash)){
      syncCheckboxes();
      try{ localStorage.setItem(STORE,JSON.stringify(saved)); }catch(e){}
      updateAll();
    }
  }
})();
</script>
